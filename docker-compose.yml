services:

  postgres:
    image: postgres:16
    container_name: helios-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: helios

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: helios-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: